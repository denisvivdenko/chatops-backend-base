services:
  api:
    build: .
    command: python -m chatops.api.main
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis

  worker:
    build: .
    command: python -m chatops.workers.worker
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
