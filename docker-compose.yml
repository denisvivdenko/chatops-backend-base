services:
  api:
    profiles: [deploy, deploy-without-worker]
    image: ${APP_IMAGE:-chatops-backend:latest}
    build: .
    command: python -m chatops.api.main
    ports:
      - "8000:8000"
    volumes:
      - resource-data:/data/resources
    environment:
      REDIS_HOST: redis
      MONGO_HOST: mongo
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  worker:
    profiles: [deploy]
    image: ${APP_IMAGE:-chatops-backend:latest}
    build: .
    command: python -m chatops.workers.worker
    environment:
      REDIS_HOST: redis
      MONGO_HOST: mongo
      OPENAI_API_KEY: ${OPENAI_API_KEY:?}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  ingestion-worker:
    profiles: [deploy]
    image: ${APP_IMAGE:-chatops-backend:latest}
    build: .
    command: python -m chatops.workers.ingestion_worker
    volumes:
      - resource-data:/data/resources
    environment:
      REDIS_HOST: redis
      MONGO_HOST: mongo
      OPENAI_API_KEY: ${OPENAI_API_KEY:?}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  redis:
    profiles: [deploy, tests, deploy-without-worker]
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 10

  mongo:
    profiles: [deploy, tests, deploy-without-worker]
    image: mongo:7
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 1s
      timeout: 3s
      retries: 10

  tests:
    profiles: [tests]
    image: ${APP_IMAGE:-chatops-backend:latest}
    build: .
    command: pytest tests/ --integration -v
    volumes:
      - ./tests:/app/tests
    environment:
      REDIS_HOST: redis
      MONGO_HOST: mongo
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  resource-data:
