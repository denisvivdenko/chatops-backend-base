services:
  api:
    profiles: [deploy]
    build: .
    command: python -m chatops.api.main
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

  worker:
    profiles: [deploy]
    build: .
    command: python -m chatops.workers.worker
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

  redis:
    profiles: [deploy, tests]
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 10

  tests:
    profiles: [tests]
    image: ${APP_IMAGE:-chatops-backend:local}
    build: .
    command: pytest tests/ --integration -v
    volumes:
      - ./tests:/app/tests
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
